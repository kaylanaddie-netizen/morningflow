<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hue — Your Style, Curated</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EFE3CC;
    --bg-deep:#E4D4B4;
    --cream:#F6EEDD;
    --ivory:#FFFDF8;
    --card:#FFFFFF;
    --rose:#C9938E;
    --sage:#93A578;
    --taupe:#B79E7E;
    --berry:#8F5A63;
    --ink:#211C17;
    --ink-soft:#8A7C69;
    --ink-faint:#B8A98C;
    --line:#E6D8B9;
    --black:#1C1712;
    --radius-lg:26px;
    --radius-md:18px;
    --radius-sm:12px;
    --shadow-soft:0 8px 26px rgba(90,70,40,0.12);
    --shadow-lift:0 16px 44px rgba(60,45,25,0.22);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:linear-gradient(180deg,#DCCBA6 0%, #CBB98F 100%);
    font-family:'Manrope',sans-serif; color:var(--ink);
    display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px 12px;
  }
  .device{
    width:400px; max-width:100%; height:840px; background:var(--bg);
    border-radius:44px; box-shadow:0 30px 80px rgba(50,35,15,0.35), 0 0 0 10px #DCC9A0, 0 0 0 12px #b39c72;
    overflow:hidden; position:relative; display:flex; flex-direction:column;
  }
  .notch{ position:absolute; top:0; left:50%; transform:translateX(-50%); width:150px; height:26px; background:#DCC9A0; border-radius:0 0 18px 18px; z-index:60; }
  .screen{ flex:1; overflow-y:auto; overflow-x:hidden; scrollbar-width:none; display:flex; flex-direction:column; animation:fadeIn .4s ease; position:relative; }
  .screen::-webkit-scrollbar{display:none;}
  @keyframes fadeIn{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

  h1,h2,h3,.serif{ font-family:'Cormorant Garamond',serif; font-weight:600; color:var(--ink); margin:0; }
  .eyebrow{ font-family:'Manrope'; font-size:10.5px; letter-spacing:0.15em; text-transform:uppercase; color:var(--ink-soft); font-weight:700; }

  .btn-black{ background:var(--black); color:#fff; border:none; border-radius:100px; padding:16px 26px; font-family:'Manrope'; font-weight:700; font-size:14.5px; cursor:pointer; box-shadow:0 10px 22px rgba(20,15,8,0.28); transition:transform .15s ease; }
  .btn-black:active{ transform:scale(0.96); }
  .btn-secondary{ background:var(--ivory); color:var(--ink); border:1.5px solid var(--line); border-radius:100px; padding:15px 26px; font-family:'Manrope'; font-weight:600; font-size:14px; cursor:pointer; transition:transform .15s ease;}
  .btn-secondary:active{ transform:scale(0.96); }
  .btn-text{ background:none; border:none; color:var(--ink-soft); font-family:'Manrope'; font-weight:600; font-size:13px; cursor:pointer; text-decoration:underline; text-underline-offset:3px; }

  .top-bar{ display:flex; align-items:center; justify-content:space-between; padding:20px 22px 6px; }
  .icon-btn{ width:36px;height:36px;border-radius:50%; background:var(--ivory); border:1px solid var(--line); display:flex;align-items:center;justify-content:center; cursor:pointer; color:var(--ink); flex-shrink:0; }
  .icon-btn.dark{ background:var(--black); color:#fff; border:none; }

  .bottom-nav{ display:flex; justify-content:space-around; align-items:center; background:var(--ivory); border-top:1px solid var(--line); padding:10px 6px calc(env(safe-area-inset-bottom,0) + 10px); z-index:40; }
  .nav-item{ display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; color:var(--ink-faint); font-size:10px; font-weight:700; padding:4px 8px; border-radius:14px; transition:all .2s ease;}
  .nav-item.active{ color:#fff; background:var(--black); }
  .nav-item svg{ width:20px; height:20px; }

  .card{ background:var(--card); border-radius:var(--radius-md); box-shadow:var(--shadow-soft); }
  .chip{ padding:9px 15px; border-radius:100px; border:1.5px solid var(--line); background:var(--ivory); font-size:12.5px; font-weight:700; color:var(--ink); cursor:pointer; transition:all .2s ease; white-space:nowrap;}
  .chip.selected{ background:var(--black); color:#fff; border-color:var(--black); }

  .stars{ display:inline-flex; gap:1px; vertical-align:middle; }
  .product-card{ background:var(--card); border-radius:var(--radius-md); overflow:hidden; box-shadow:var(--shadow-soft); cursor:pointer; transition:transform .15s ease; }
  .product-card:active{ transform:scale(0.97); }
  .product-visual{ aspect-ratio:1/1.15; display:flex; align-items:center; justify-content:center; position:relative; }
  .badge-pill{ position:absolute; top:9px; left:9px; background:rgba(28,23,18,0.85); border-radius:100px; padding:4px 10px; font-size:9.5px; font-weight:800; color:#fff; display:flex; align-items:center; gap:3px; }
  .corner-btn{ position:absolute; top:9px; right:9px; width:28px;height:28px;border-radius:50%; background:rgba(255,253,250,0.92); display:flex;align-items:center;justify-content:center; color:var(--ink); cursor:pointer; }
  .corner-btn.saved{ color:var(--berry); }
  ::-webkit-scrollbar{ width:0; height:0; }
</style>
</head>
<body>
<div class="device">
  <div class="notch"></div>
  <div id="app" class="screen"></div>
</div>

<script>
/* ================= DATA ================= */
const PALETTE = [
  {name:'Dusty Rose', hex:'#C9938E'}, {name:'Soft Sage', hex:'#9BAE85'}, {name:'Ivory', hex:'#F1E8D6'},
  {name:'Warm Taupe', hex:'#B99B79'}, {name:'Muted Berry', hex:'#8F5A63'}, {name:'Dusty Blue', hex:'#8FA3AC'},
];
const AVOID = [ {name:'Neon Orange', hex:'#FF6A2B'}, {name:'Stark Black', hex:'#111111'}, {name:'Icy Blue', hex:'#B8E4F0'} ];
const AESTHETICS = [
  {name:'Clean Girl', hex:'#EFE6D8'}, {name:'Cottagecore', hex:'#C7C99A'}, {name:'Soft Feminine', hex:'#E7C6C0'},
  {name:'Minimal', hex:'#DAD3C6'}, {name:'Scandinavian', hex:'#E3E0D6'}, {name:'Old Money', hex:'#B8A883'},
  {name:'Quiet Luxury', hex:'#C9B79A'}, {name:'Streetwear', hex:'#B7ACA0'}, {name:'Dark Academia', hex:'#7C6A55'},
  {name:'Coastal', hex:'#AFC4C4'}, {name:'Romantic', hex:'#D9A9A9'}, {name:'Boho', hex:'#C39A6B'},
];
const ICONS = {
  sweater:'M8 3l-3 2v4l2-1v11h10V8l2 1V5l-3-2-2 2h-4l-2-2z',
  dress:'M9 3l-1 4-3 12h14l-3-12-1-4-3 2-3-2z',
  jacket:'M7 4L3 7v5l3-1v10h12V11l3 1V7l-4-3-3 2h-4l-3-2z',
  pants:'M6 3h12l1 18h-5l-1-11-1 11H7L6 3z',
  shoe:'M3 17c0-2 2-3 4-4l6-5 2 2-3 3h7c2 0 3 1 3 3v1H3v-0z',
  bag:'M6 8h12l1 13H5L6 8zM9 8V6a3 3 0 016 0v2',
  jewel:'M12 3l4 5-4 13-4-13 4-5zM3 8h18',
  lamp:'M9 3h6l2 6H7l2-6zM12 9v9m-4 3h8',
  sofa:'M4 12v6h16v-6M3 12a2 2 0 012-2h14a2 2 0 012 2v2H3v-2zM6 10V8a2 2 0 012-2h8a2 2 0 012 2v2',
  rug:'M3 6h18v12H3zM3 10h18M3 14h18M7 6v12M17 6v12',
  plant:'M12 21V10M12 10c-4 0-6-3-6-6 4 0 6 3 6 6zm0 0c0-4 3-6 6-6 0 4-3 6-6 6z',
  blanket:'M3 6h18v6c0 4-4 6-9 6s-9-2-9-6V6zM3 9h18',
};
function icon(name, color, size=34){
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="${ICONS[name]||ICONS.sweater}"/></svg>`;
}
const CATEGORIES = [
  {id:'tshirt', label:'T-Shirts', icon:'sweater', noun:'Tee', group:'fashion', sizes:['XS','S','M','L','XL']},
  {id:'sweater', label:'Sweaters', icon:'sweater', noun:'Sweater', group:'fashion', sizes:['XS','S','M','L']},
  {id:'jacket', label:'Jackets', icon:'jacket', noun:'Jacket', group:'fashion', sizes:['XS','S','M','L']},
  {id:'jeans', label:'Jeans', icon:'pants', noun:'Jean', group:'fashion', sizes:['24','26','28','30','32']},
  {id:'dress', label:'Dresses', icon:'dress', noun:'Dress', group:'fashion', sizes:['XS','S','M','L']},
  {id:'skirt', label:'Skirts', icon:'dress', noun:'Skirt', group:'fashion', sizes:['XS','S','M','L']},
  {id:'shoe', label:'Shoes', icon:'shoe', noun:'Flat', group:'fashion', sizes:['36','37','38','39','40']},
  {id:'bag', label:'Bags', icon:'bag', noun:'Bag', group:'fashion', sizes:['One size']},
  {id:'jewelry', label:'Jewelry', icon:'jewel', noun:'Earring', group:'fashion', sizes:['One size']},
  {id:'sofa', label:'Sofas', icon:'sofa', noun:'Sofa', group:'home', sizes:['One size']},
  {id:'lamp', label:'Lighting', icon:'lamp', noun:'Lamp', group:'home', sizes:['One size']},
  {id:'rug', label:'Rugs', icon:'rug', noun:'Rug', group:'home', sizes:['5x7','8x10']},
  {id:'blanket', label:'Textiles', icon:'blanket', noun:'Throw', group:'home', sizes:['One size']},
  {id:'plant', label:'Plants', icon:'plant', noun:'Plant', group:'home', sizes:['One size']},
];
const ADJECTIVES = ['Brushed','Relaxed','Tailored','Soft','Draped','Textured','Fluid','Structured','Classic','Airy','Cropped','Oversized','Fitted','Woven','Cozy','Cloud'];
const BRANDS = ['Amara & Co','Field Studio','Solene','Maison Field','Ilsa','Loelle','Corda','Norr','Hearth Home','Verdant','Solstice','Rowan Lane'];
const REASONS = ['Matches your palette','Matches your aesthetic','Available in your size','Within your budget','Trending in your feed'];

function seedRand(seed){ const x=Math.sin(seed)*10000; return x-Math.floor(x); }
function generateProduct(cat, idx){
  const s = idx + cat.id.length*13;
  const adj = ADJECTIVES[idx % ADJECTIVES.length];
  const brand = BRANDS[Math.floor(seedRand(s)*BRANDS.length)];
  const color = PALETTE[idx % PALETTE.length];
  const price = 28 + Math.floor(seedRand(s*2)*170);
  const match = 82 + Math.floor(seedRand(s*3)*17);
  const rating = (3.8 + seedRand(s*4)*1.1).toFixed(1);
  const aesthetic = AESTHETICS[Math.floor(seedRand(s*5)*AESTHETICS.length)].name;
  const reasons = [REASONS[idx%REASONS.length], REASONS[(idx+2)%REASONS.length]];
  return { id:`${cat.id}-${idx}`, name:`${adj} ${cat.noun}`, brand, price, hex:color.hex, colorName:color.name,
    icon:cat.icon, sizes:cat.sizes, match, rating, aesthetic, reasons, category:cat.id, categoryLabel:cat.label };
}
function catById(id){ return CATEGORIES.find(c=>c.id===id); }
function tint(hex){ return `color-mix(in srgb, ${hex} 24%, var(--cream))`; }

function buildCuratedPool(n=28){
  const pool=[]; let i=0;
  while(pool.length<n){
    const cat = CATEGORIES[pool.length % (CATEGORIES.length-3)]; // bias toward fashion
    pool.push(generateProduct(cat, i)); i++;
  }
  return pool.sort((a,b)=>b.match-a.match);
}

/* ================= STATE ================= */
const state = {
  screen:'welcome',
  selectedAesthetics:['Soft Feminine','Quiet Luxury'],
  saved:new Set(),
  liked:new Set(),
  disliked:new Set(),
  swipeCount:0,
  curatedPool:buildCuratedPool(28),
  discoverIndex:0,
  showCheckIn:false,
  activeFilter:'All',
  categoryBatches:{},
  currentCategory:null,
  currentProduct:null,
  detailReturn:'shop',
  collectionsView:'mood',
  toast:null,
};

function go(screen, opts={}){ Object.assign(state, opts); state.screen=screen; render(); const el=document.getElementById('app'); if(el) el.scrollTop=0; }
function showToast(msg){ state.toast=msg; render(); setTimeout(()=>{ state.toast=null; const t=document.getElementById('toast'); if(t) t.style.opacity=0; }, 1800); }

function toggleSave(id, ev){ if(ev) ev.stopPropagation(); state.saved.has(id)?state.saved.delete(id):state.saved.add(id); render(); }
function toggleAesthetic(name){ const i=state.selectedAesthetics.indexOf(name); if(i>-1) state.selectedAesthetics.splice(i,1); else state.selectedAesthetics.push(name); render(); }

function openCategory(catId){ if(!state.categoryBatches[catId]) state.categoryBatches[catId]=1; go('categoryDetail', {currentCategory:catId}); }
function loadMoreCategory(){ state.categoryBatches[state.currentCategory]++; render(); }
function openProduct(p, from){ go('productDetail', {currentProduct:p, detailReturn:from}); }

/* Discover swipe logic */
function currentDiscoverCard(){
  const pool = state.curatedPool;
  return pool[state.discoverIndex % pool.length];
}
function discoverAction(action, ev){
  if(ev) ev.stopPropagation();
  const p = currentDiscoverCard();
  if(action==='like'){ state.liked.add(p.id); state.saved.add(p.id); showToastQuiet('Added to your taste profile'); }
  if(action==='dislike'){ state.disliked.add(p.id); }
  if(action==='save'){ toggleSave(p.id); return; }
  if(action==='shop'){ openProduct(p, 'discover'); return; }
  state.swipeCount++;
  state.discoverIndex++;
  if(state.swipeCount>0 && state.swipeCount%5===0){ state.showCheckIn=true; }
  render();
}
function showToastQuiet(msg){ state.toast=msg; }
function dismissCheckIn(){ state.showCheckIn=false; render(); }
function advanceDiscover(){ state.discoverIndex++; render(); }

/* ================= ICONS ================= */
function chevronLeft(c='currentColor'){ return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>`; }
function checkIcon(c='currentColor'){ return `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>`; }
function heartIcon(filled,c='currentColor'){ return `<svg width="16" height="16" viewBox="0 0 24 24" fill="${filled?c:'none'}" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 00-7.8 0L12 5.6l-1-1a5.5 5.5 0 00-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 000-7.8z"/></svg>`; }
function xIcon(c='currentColor'){ return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>`; }
function bagIcon(c='currentColor', size=17){ return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8h12l1 13H5L6 8zM9 8V6a3 3 0 016 0v2"/></svg>`; }
function bookmarkIconSm(filled,c='currentColor'){ return `<svg width="16" height="16" viewBox="0 0 24 24" fill="${filled?c:'none'}" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h12v17l-6-4-6 4V4z"/></svg>`; }
function sparkleSm(c='currentColor'){ return `<svg width="10" height="10" viewBox="0 0 24 24" fill="${c}"><path d="M12 2l2 7 7 2-7 2-2 7-2-7-7-2 7-2 2-7z"/></svg>`; }
function starIcon(filled,c='#1C1712'){ return `<svg width="11" height="11" viewBox="0 0 24 24" fill="${filled?c:'none'}" stroke="${c}" stroke-width="1.4"><path d="M12 2.5l2.9 6.3 6.9.7-5.2 4.7 1.5 6.8L12 17.6l-6.1 3.4 1.5-6.8L2.2 9.5l6.9-.7L12 2.5z"/></svg>`; }
function starsRow(rating){
  const r = Math.round(rating*2)/2; let out='<span class="stars">';
  for(let i=1;i<=5;i++){ out += starIcon(i<=r); }
  out += `</span> <span style="font-size:11px; color:var(--ink-soft); font-weight:700; margin-left:3px;">${rating}</span>`;
  return out;
}
function plusIcon(){ return `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--ink-soft)" stroke-width="1.8" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>`; }
function homeIcon(){ return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l2 8 7 2-7 2-2 8-2-8-7-2 7-2 2-8z"/></svg>`; }
function shopGridIcon(){ return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="7" height="7" rx="1.5"/><rect x="13" y="4" width="7" height="7" rx="1.5"/><rect x="4" y="13" width="7" height="7" rx="1.5"/><rect x="13" y="13" width="7" height="7" rx="1.5"/></svg>`; }
function bookmarkIconNav(){ return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12v18l-6-4-6 4V3z"/></svg>`; }
function personIcon(){ return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.6"/><path d="M4.5 20c0-4 3.4-6.5 7.5-6.5s7.5 2.5 7.5 6.5"/></svg>`; }

/* ================= ONBOARDING SCREENS ================= */
function screenWelcome(){
  return `
  <div style="flex:1; display:flex; flex-direction:column; justify-content:space-between; background:linear-gradient(170deg, #F1E5CB 0%, #E6D4AE 55%, #DCC698 100%);">
    <div style="padding:26px 30px 0;">
      <div class="eyebrow">A quiet kind of shopping</div>
    </div>
    <div style="position:relative; height:300px; margin:10px 0;">
      <div style="position:absolute; width:210px; height:210px; border-radius:50%; background:radial-gradient(circle at 35% 30%, ${PALETTE[3].hex}, ${PALETTE[0].hex}); top:20px; left:20px; box-shadow:var(--shadow-lift);"></div>
      <div style="position:absolute; width:150px; height:150px; border-radius:50%; background:radial-gradient(circle at 35% 30%, ${PALETTE[2].hex}, ${PALETTE[4].hex}); top:120px; right:20px; box-shadow:var(--shadow-soft);"></div>
      <div style="position:absolute; bottom:0; left:36px; display:flex; gap:8px;">
        ${PALETTE.slice(0,4).map(c=>`<div style="width:34px;height:34px;border-radius:50%; background:${c.hex}; border:3px solid var(--bg);"></div>`).join('')}
      </div>
    </div>
    <div style="padding:0 32px 40px;">
      <h1 class="serif" style="font-size:44px; line-height:1.06; margin-bottom:14px;">Your Style</h1>
      <p style="color:var(--ink-soft); font-size:14px; line-height:1.6; margin-bottom:28px; max-width:280px;">Hue reads your coloring and taste, then curates a feed of only what genuinely fits you — no endless scrolling required.</p>
      <button class="btn-black" style="width:100%; padding:17px;" onclick="go('upload')">Shop Now →</button>
      <div style="margin-top:14px; text-align:center;"><button class="btn-text" onclick="go('discover')">I already have an account</button></div>
    </div>
  </div>`;
}

function screenUpload(){
  return `
  <div class="top-bar"><div class="icon-btn" onclick="go('welcome')">${chevronLeft()}</div><div class="eyebrow">Step 1 of 3</div><div style="width:36px"></div></div>
  <div style="flex:1; padding:20px 28px 36px; display:flex; flex-direction:column;">
    <h2 class="serif" style="font-size:28px; margin-bottom:10px;">Let's find your palette</h2>
    <p style="color:var(--ink-soft); font-size:14px; line-height:1.6; margin-bottom:26px;">A clear, well-lit selfie helps us read your skin tone, undertone and contrast. Prefer not to upload one? A short quiz works just as well.</p>
    <div class="card" style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:30px; border:1.5px dashed var(--line); min-height:250px;">
      <div style="width:84px;height:84px;border-radius:50%; background:linear-gradient(135deg,${PALETTE[0].hex},${PALETTE[3].hex}); display:flex; align-items:center; justify-content:center;">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.5-6 8-6s8 2 8 6"/></svg>
      </div>
      <p style="font-size:13px; color:var(--ink-soft); text-align:center; max-width:220px;">Your photo is used only to analyze your coloring, and is never shared.</p>
    </div>
    <div style="display:flex; flex-direction:column; gap:12px; margin-top:22px;">
      <button class="btn-black" onclick="go('analyzing')">Upload a Selfie</button>
      <button class="btn-secondary" onclick="go('analyzing')">Take a Selfie</button>
      <button class="btn-text" style="margin-top:2px;" onclick="go('analyzing')">Take a short quiz instead</button>
    </div>
  </div>`;
}

function screenAnalyzing(){
  setTimeout(()=>{ if(state.screen==='analyzing'){ go('skinResults'); } }, 2000);
  return `
  <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px; text-align:center;">
    <div style="position:relative; width:88px; height:88px; margin-bottom:220px; z-index:2;">
      <div style="width:100%;height:100%; border-radius:50%; background:linear-gradient(160deg, #E3B79A, #C98F6E); box-shadow:0 10px 26px rgba(180,130,90,0.3); position:relative;">
        <div style="position:absolute; inset:-6px; border:1.5px dashed rgba(28,23,18,0.35); border-radius:50%; animation:spin 6s linear infinite;"></div>
      </div>
    </div>
    <div style="position:absolute; top:120px;">
      <h2 class="serif" style="font-size:24px; margin-bottom:10px;">Reading your coloring…</h2>
      <p style="color:var(--ink-soft); font-size:13.5px; line-height:1.6;">Checking undertone, contrast and depth to build a palette that's truly yours.</p>
    </div>
  </div>

    </div>
    <div class="card" style="padding:16px; display:flex; flex-direction:column; gap:10px;">
      <div class="eyebrow">Your Style DNA</div>
      ${breakdown.map((n,i)=>{ const pct=Math.round(100/breakdown.length); return `
        <div>
          <div style="display:flex; justify-content:space-between; font-size:12px; font-weight:700; margin-bottom:4px;"><span>${n}</span><span style="color:var(--ink-soft);">${pct}%</span></div>
          <div style="height:6px; border-radius:100px; background:var(--line);"><div style="width:${pct}%; height:100%; border-radius:100px; background:var(--black);"></div></div>
        </div>`; }).join('')}
      <p style="font-size:11.5px; color:var(--ink-faint); margin-top:4px;">Refines automatically the more you swipe in Discover.</p>
    </div>
    <div class="card" style="padding:16px; display:flex; flex-direction:column; gap:12px;">
      <div class="eyebrow">Sizes & Fit</div>
      ${[['Top','M'],['Bottom','28'],['Dress','M'],['Shoe','38'],['Preferred fit','Relaxed']].map(([k,v])=>`
        <div style="display:flex; justify-content:space-between; align-items:center;"><span style="font-size:13px;">${k}</span><span class="chip" style="cursor:default; padding:5px 12px; font-size:11.5px;">${v}</span></div>`).join('')}
    </div>
  </div>
  ${bottomNav('profile')}`;
}

/* ================= RENDER ================= */
function render(){
  const map={
    welcome:screenWelcome, upload:screenUpload, analyzing:screenAnalyzing,
    skinResults:screenSkinResults, palette:screenPalette, aesthetic:screenAesthetic,
    discover:screenDiscover, shop:screenShop, categoryDetail:screenCategoryDetail,
    productDetail:screenProductDetail, collections:screenCollections, profile:screenProfile,
  };
  document.getElementById('app').innerHTML = map[state.screen]();
}
render();
</script>
</body>
